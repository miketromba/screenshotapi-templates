name: Visual snapshots

on:
  pull_request:
  workflow_dispatch:

jobs:
  visual-snapshots:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Capture and compare screenshots
        env:
          SCREENSHOTAPI_KEY: ${{ secrets.SCREENSHOTAPI_KEY }}
          SCREENSHOTAPI_BASE_URL: https://screenshotapi.to
        run: bun run snapshot -- --config visual-snapshot.config.json --out artifacts

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: artifacts
