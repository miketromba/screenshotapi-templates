name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: bun install --frozen-lockfile
      - run: bun run validate
      - run: bun run typecheck
      - run: bun run build
      - run: bun run smoke
